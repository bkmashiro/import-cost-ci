name: Import Cost Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  import-cost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check import costs
        uses: ./
        with:
          file: src/index.ts
          limit: 50kb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

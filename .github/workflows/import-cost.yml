name: Import Cost Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Default job: esbuild bundler (fastest, recommended for most projects)
  import-cost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check import costs (esbuild)
        uses: ./
        with:
          file: src/index.ts
          limit: 50kb
          # bundler defaults to esbuild — omit the key or set it explicitly:
          # bundler: esbuild
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Example: webpack bundler — use when your app is built with webpack

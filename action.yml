name: import-cost-ci
description: Check bundle size cost of imports and fail CI if limit exceeded
inputs:
  file:
    description: File to analyze
    required: true
  limit:
    description: Size limit e.g. 50kb
    default: "100kb"
  no-fail:
    description: Do not fail CI, just report
    default: "false"
  treemap:
    description: Print the import size treemap
    default: "false"
  history:
    description: Track bundle size history in .import-cost-history.json
    default: "false"
  bundler:
    description: Bundler to use (esbuild, webpack, vite, rollup)
    required: false
    default: "esbuild"
runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: npm install --prefix "${{ github.action_path }}" --production
    - name: Run import-cost-ci
      shell: bash
      run: node "${{ github.action_path }}/dist/action-bundle.cjs"
      env:
        INPUT_FILE: ${{ inputs.file }}
        INPUT_LIMIT: ${{ inputs.limit }}
        INPUT_NO_FAIL: ${{ inputs.no-fail }}
        INPUT_TREEMAP: ${{ inputs.treemap }}
        INPUT_HISTORY: ${{ inputs.history }}
        INPUT_BUNDLER: ${{ inputs.bundler }}
